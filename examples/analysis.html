<script>
// --- Hex geometry ---
const HEX_SIZE = 14;
const HEX_W = Math.sqrt(3) * HEX_SIZE;
const HEX_H = 2 * HEX_SIZE;

function cellToPixel(col, row) {
  return { x: HEX_W * (col + 0.5 * (row & 1)), y: 0.75 * HEX_H * row };
}
function hexPoints(cx, cy, size) {
  const pts = [];
  for (let i = 0; i < 6; i++) {
    const a = (Math.PI / 3) * i - Math.PI / 2;
    pts.push(`${cx + size * Math.cos(a)},${cy + size * Math.sin(a)}`);
  }
  return pts.join(" ");
}
function computeStateBorders(hexes, size) {
  const evenNbr = [[0,-1],[1,0],[0,1],[-1,1],[-1,0],[-1,-1]];
  const oddNbr = [[1,-1],[1,0],[1,1],[0,1],[-1,0],[0,-1]];
  const stateAt = new Map();
  for (const h of hexes) stateAt.set(`${h.col},${h.row}`, h.state);
  const segs = [];
  for (const h of hexes) {
    const nbrs = h.row & 1 ? oddNbr : evenNbr;
    for (let d = 0; d < 6; d++) {
      const [dc, dr] = nbrs[d];
      if (stateAt.get(`${h.col+dc},${h.row+dr}`) === h.state) continue;
      const a0 = (Math.PI/3)*d - Math.PI/2, a1 = (Math.PI/3)*((d+1)%6) - Math.PI/2;
      segs.push(`M${(h.px+size*Math.cos(a0)).toFixed(2)},${(h.py+size*Math.sin(a0)).toFixed(2)}L${(h.px+size*Math.cos(a1)).toFixed(2)},${(h.py+size*Math.sin(a1)).toFixed(2)}`);
    }
  }
  return segs.join("");
}

const STATE_COLORS = { ACT:"#8B5CF6", NSW:"#3B82F6", NT:"#F97316", QLD:"#991B1B", SA:"#EF4444", TAS:"#06B6D4", VIC:"#1D4ED8", WA:"#EAB308" };

// Approximate geographic centroids (lat, lon) for error analysis
const GEO = {"Bean":[-35.38,149.08],"Canberra":[-35.25,149.15],"Fenner":[-35.25,149.03],"Lingiari":[-23.70,133.88],"Solomon":[-12.45,130.84],"Bass":[-41.18,147.50],"Braddon":[-41.30,145.50],"Clark":[-42.88,147.33],"Franklin":[-43.00,147.00],"Lyons":[-42.00,146.50],"Adelaide":[-34.88,138.58],"Barker":[-36.00,140.50],"Boothby":[-35.02,138.57],"Grey":[-31.50,137.50],"Hindmarsh":[-34.95,138.48],"Kingston":[-35.12,138.55],"Makin":[-34.78,138.67],"Mayo":[-35.20,138.80],"Spence":[-34.72,138.58],"Sturt":[-34.93,138.68],"Blair":[-27.62,152.55],"Bonner":[-27.49,153.12],"Bowman":[-27.55,153.25],"Brisbane":[-27.47,153.02],"Capricornia":[-23.38,150.51],"Dawson":[-21.15,149.19],"Dickson":[-27.32,152.95],"Fadden":[-27.88,153.22],"Fairfax":[-26.65,153.08],"Fisher":[-26.82,152.98],"Flynn":[-23.80,148.50],"Forde":[-27.70,153.15],"Griffith":[-27.53,153.05],"Groom":[-27.56,151.95],"Herbert":[-19.27,146.80],"Hinkler":[-25.30,152.35],"Kennedy":[-19.50,145.00],"Leichhardt":[-16.92,145.77],"Lilley":[-27.38,153.05],"Longman":[-27.08,152.95],"Maranoa":[-26.00,148.00],"McPherson":[-28.12,153.43],"Moncrieff":[-28.00,153.40],"Moreton":[-27.58,152.98],"Oxley":[-27.60,152.95],"Petrie":[-27.28,153.00],"Rankin":[-27.65,153.08],"Ryan":[-27.50,152.90],"Wide Bay":[-25.80,152.70],"Wright":[-27.20,152.50],"Banks":[-33.97,151.05],"Barton":[-33.94,151.13],"Bennelong":[-33.80,151.09],"Berowra":[-33.60,151.08],"Blaxland":[-33.88,150.95],"Bradfield":[-33.77,151.15],"Calare":[-33.30,149.10],"Chifley":[-33.75,150.82],"Cook":[-34.05,151.12],"Cowper":[-30.30,153.10],"Cunningham":[-34.42,150.85],"Dobell":[-33.25,151.50],"Eden-Monaro":[-36.00,149.50],"Farrer":[-35.80,146.00],"Fowler":[-33.92,150.88],"Gilmore":[-34.80,150.50],"Grayndler":[-33.88,151.15],"Greenway":[-33.77,150.92],"Hughes":[-34.05,151.03],"Hume":[-34.50,149.50],"Hunter":[-32.75,151.45],"Kingsford Smith":[-33.93,151.23],"Lindsay":[-33.76,150.70],"Lyne":[-31.90,152.50],"Macarthur":[-34.08,150.73],"Mackellar":[-33.72,151.28],"Macquarie":[-33.60,150.45],"McMahon":[-33.83,150.95],"Mitchell":[-33.70,150.97],"New England":[-30.50,151.65],"Newcastle":[-32.93,151.78],"North Sydney":[-33.82,151.20],"Page":[-29.50,153.00],"Parkes":[-32.50,148.50],"Parramatta":[-33.82,151.02],"Paterson":[-32.70,151.70],"Reid":[-33.85,151.08],"Richmond":[-28.80,153.30],"Riverina":[-35.00,147.00],"Robertson":[-33.40,151.38],"Shortland":[-32.97,151.62],"Sydney":[-33.87,151.21],"Warringah":[-33.78,151.27],"Watson":[-33.91,151.14],"Wentworth":[-33.89,151.28],"Werriwa":[-33.95,150.83],"Whitlam":[-34.42,150.90],"Aston":[-37.87,145.22],"Ballarat":[-37.55,143.85],"Bendigo":[-36.76,144.28],"Bruce":[-37.97,145.18],"Calwell":[-37.65,144.80],"Casey":[-37.90,145.35],"Chisholm":[-37.82,145.10],"Cooper":[-37.75,145.00],"Corangamite":[-38.25,144.10],"Corio":[-38.10,144.35],"Deakin":[-37.82,145.15],"Dunkley":[-38.15,145.13],"Flinders":[-38.37,145.18],"Fraser":[-37.73,144.78],"Gellibrand":[-37.82,144.82],"Gippsland":[-38.05,146.50],"Goldstein":[-37.92,145.00],"Gorton":[-37.75,144.68],"Hawke":[-37.68,144.55],"Higgins":[-37.87,145.02],"Holt":[-38.05,145.30],"Hotham":[-37.90,145.10],"Indi":[-36.40,146.40],"Isaacs":[-38.05,145.15],"Jagajaga":[-37.72,145.05],"Kooyong":[-37.83,145.04],"La Trobe":[-37.98,145.45],"Lalor":[-37.72,144.62],"Macnamara":[-37.86,144.97],"Mallee":[-36.00,143.00],"Maribyrnong":[-37.78,144.88],"McEwen":[-37.45,145.10],"Melbourne":[-37.81,144.96],"Menzies":[-37.77,145.15],"Monash":[-38.12,145.55],"Nicholls":[-36.35,145.40],"Scullin":[-37.70,145.00],"Wannon":[-37.70,142.50],"Wills":[-37.76,144.94],"Brand":[-32.32,115.77],"Bullwinkel":[-31.88,116.05],"Burt":[-32.08,115.97],"Canning":[-32.20,115.88],"Cowan":[-31.78,115.80],"Curtin":[-31.93,115.78],"Durack":[-25.00,121.00],"Forrest":[-33.50,115.70],"Fremantle":[-32.05,115.75],"Hasluck":[-31.88,116.05],"Moore":[-31.48,115.75],"O'Connor":[-33.00,121.50],"Pearce":[-31.65,116.00],"Perth":[-31.95,115.86],"Stirling":[-31.83,115.83],"Swan":[-31.90,115.92],"Tangney":[-32.00,115.85]};

let DATA = null;
let currentTab = "2019-2022";

async function loadData() {
  const resp = await fetch("../data/elections.json");
  DATA = await resp.json();
  render();
}

function resolve(grid) {
  return grid.map(([col, row, state, name]) => {
    const { x, y } = cellToPixel(col, row);
    return { col, row, state, name, px: x, py: y };
  });
}

// --- Transition analysis ---
function analyzeTransition(fromId, toId) {
  const fromEntry = DATA[fromId], toEntry = DATA[toId];
  const fromHexes = resolve(fromEntry.grid), toHexes = resolve(toEntry.grid);
  const fromMap = new Map(fromHexes.map(h => [h.name, h]));
  const toMap = new Map(toHexes.map(h => [h.name, h]));

  const moved = [], stayed = [], added = [], removed = [];
  for (const [name, h] of toMap) {
    const prev = fromMap.get(name);
    if (!prev) { added.push(name); }
    else if (prev.col !== h.col || prev.row !== h.row) { moved.push({ name, state: h.state, from: `[${prev.col},${prev.row}]`, to: `[${h.col},${h.row}]` }); }
    else { stayed.push(name); }
  }
  for (const [name] of fromMap) { if (!toMap.has(name)) removed.push(name); }

  return { fromHexes, toHexes, fromEntry, toEntry, moved, stayed, added, removed, fromMap, toMap };
}

// --- Geographic error analysis ---
function computeError(hexes) {
  // Normalize geo coords to hex pixel space and measure displacement
  const withGeo = hexes.filter(h => GEO[h.name]);
  if (withGeo.length === 0) return { rms: 0, mean: 0, max: 0, maxName: "" };

  const lats = withGeo.map(h => GEO[h.name][0]);
  const lngs = withGeo.map(h => GEO[h.name][1]);
  const pxs = withGeo.map(h => h.px);
  const pys = withGeo.map(h => h.py);

  const latMin = Math.min(...lats), latMax = Math.max(...lats);
  const lngMin = Math.min(...lngs), lngMax = Math.max(...lngs);
  const pxMin = Math.min(...pxs), pxMax = Math.max(...pxs);
  const pyMin = Math.min(...pys), pyMax = Math.max(...pys);

  const latR = latMax - latMin || 1, lngR = lngMax - lngMin || 1;
  const pxR = pxMax - pxMin || 1, pyR = pyMax - pyMin || 1;

  let sumSq = 0, sumAbs = 0, maxErr = 0, maxName = "";
  for (const h of withGeo) {
    const [lat, lng] = GEO[h.name];
    const idealX = pxMin + (lng - lngMin) / lngR * pxR;
    const idealY = pyMin + (latMax - lat) / latR * pyR;
    const err = Math.sqrt((h.px - idealX) ** 2 + (h.py - idealY) ** 2);
    sumSq += err * err;
    sumAbs += err;
    if (err > maxErr) { maxErr = err; maxName = h.name; }
  }
  return { rms: Math.sqrt(sumSq / withGeo.length), mean: sumAbs / withGeo.length, max: maxErr, maxName, count: withGeo.length };
}

// --- SVG rendering ---
const svgNS = "http://www.w3.org/2000/svg";
const tooltip = document.getElementById("tooltip");

function renderMap(svgEl, hexes, opts = {}) {
  svgEl.innerHTML = "";
  const { movedNames, addedNames, removedCells, highlight } = opts;
  const movedSet = new Set(movedNames || []);
  const addedSet = new Set(addedNames || []);
  const removedSet = new Set((removedCells || []).map(c => `${c.col},${c.row}`));

  const pad = HEX_SIZE * 2;
  const xs = hexes.map(h => h.px), ys = hexes.map(h => h.py);
  const minX = Math.min(...xs) - pad, minY = Math.min(...ys) - pad;
  const maxX = Math.max(...xs) + pad, maxY = Math.max(...ys) + pad;
  svgEl.setAttribute("viewBox", `${minX} ${minY} ${maxX-minX} ${maxY-minY}`);

  for (const h of hexes) {
    const poly = document.createElementNS(svgNS, "polygon");
    poly.setAttribute("points", hexPoints(h.px, h.py, HEX_SIZE));

    let fill = STATE_COLORS[h.state] || "#6B7280";
    let strokeColor = "rgba(255,255,255,0.2)";
    let strokeWidth = "0.5";

    if (highlight === "changes") {
      if (movedSet.has(h.name)) { fill = "#f59e0b"; strokeColor = "#fbbf24"; strokeWidth = "1.5"; }
      else if (addedSet.has(h.name)) { fill = "#22c55e"; strokeColor = "#4ade80"; strokeWidth = "1.5"; }
    }

    poly.setAttribute("fill", fill);
    poly.setAttribute("stroke", strokeColor);
    poly.setAttribute("stroke-width", strokeWidth);
    poly.style.cursor = "pointer";

    const name = h.name;
    poly.addEventListener("mouseenter", (e) => {
      poly.setAttribute("stroke", "white");
      poly.setAttribute("stroke-width", "3");
      let detail = `<span class="tt-detail">${h.state} · [${h.col}, ${h.row}]</span>`;
      if (movedSet.has(name)) detail += `<br><span class="tt-moved">⚡ Moved</span>`;
      if (addedSet.has(name)) detail += `<br><span style="color:#4ade80">✦ New electorate</span>`;
      tooltip.innerHTML = `<span class="tt-name">${name}</span><br>${detail}`;
      tooltip.style.display = "block";
    });
    poly.addEventListener("mousemove", (e) => {
      tooltip.style.left = (e.clientX + 12) + "px";
      tooltip.style.top = (e.clientY - 10) + "px";
    });
    poly.addEventListener("mouseleave", () => {
      poly.setAttribute("stroke", strokeColor);
      poly.setAttribute("stroke-width", strokeWidth);
      tooltip.style.display = "none";
    });
    svgEl.appendChild(poly);
  }

  // State borders
  const path = document.createElementNS(svgNS, "path");
  path.setAttribute("d", computeStateBorders(hexes, HEX_SIZE));
  path.setAttribute("fill", "none");
  path.setAttribute("stroke", "rgba(255,255,255,0.5)");
  path.setAttribute("stroke-width", "2");
  path.setAttribute("stroke-linecap", "round");
  path.setAttribute("pointer-events", "none");
  svgEl.appendChild(path);
}

// --- Analysis panel ---
function renderAnalysis(analysis) {
  const el = document.getElementById("analysis");
  const { moved, stayed, added, removed, fromHexes, toHexes, fromEntry, toEntry } = analysis;

  const errFrom = computeError(fromHexes);
  const errTo = computeError(toHexes);

  let html = `
    <h2>Transition Summary</h2>
    <div style="display:flex;gap:8px;flex-wrap:wrap">
      <div class="stat-card" style="flex:1"><div class="value">${stayed.length}</div><div class="label">Stayed</div></div>
      <div class="stat-card" style="flex:1"><div class="value" style="color:#f59e0b">${moved.length}</div><div class="label">Moved</div></div>
      <div class="stat-card" style="flex:1"><div class="value" style="color:#22c55e">${added.length}</div><div class="label">Added</div></div>
      <div class="stat-card" style="flex:1"><div class="value" style="color:#f87171">${removed.length}</div><div class="label">Removed</div></div>
    </div>

    <h2 style="margin-top:16px">Geographic Error</h2>
    <p style="font-size:0.75rem;color:#6070a0;margin-bottom:8px">
      How far each electorate is from its ideal position (normalised geographic centroid → hex pixel space).
    </p>
    <table class="score-table">
      <tr><th></th><th>${fromEntry.label}</th><th>${toEntry.label}</th></tr>
      <tr><td>RMS error</td><td class="num">${errFrom.rms.toFixed(1)} px</td><td class="num">${errTo.rms.toFixed(1)} px</td></tr>
      <tr><td>Mean error</td><td class="num">${errFrom.mean.toFixed(1)} px</td><td class="num">${errTo.mean.toFixed(1)} px</td></tr>
      <tr><td>Max error</td><td class="num">${errFrom.max.toFixed(1)} px</td><td class="num">${errTo.max.toFixed(1)} px</td></tr>
      <tr><td>Worst</td><td class="num">${errFrom.maxName}</td><td class="num">${errTo.maxName}</td></tr>
      <tr><td>Electorates</td><td class="num">${errFrom.count}</td><td class="num">${errTo.count}</td></tr>
    </table>

    <h2 style="margin-top:16px">State Seat Counts</h2>
    <table class="score-table">
      <tr><th>State</th><th>${fromEntry.label}</th><th>${toEntry.label}</th><th>Δ</th></tr>`;

  const statesFrom = {}, statesTo = {};
  for (const h of fromHexes) statesFrom[h.state] = (statesFrom[h.state]||0) + 1;
  for (const h of toHexes) statesTo[h.state] = (statesTo[h.state]||0) + 1;
  const allStates = [...new Set([...Object.keys(statesFrom), ...Object.keys(statesTo)])].sort();
  for (const st of allStates) {
    const f = statesFrom[st] || 0, t = statesTo[st] || 0, d = t - f;
    const cls = d > 0 ? "better" : d < 0 ? "worse" : "";
    html += `<tr><td>${st}</td><td class="num">${f}</td><td class="num">${t}</td><td class="num ${cls}">${d > 0 ? "+"+d : d || "—"}</td></tr>`;
  }
  html += `</table>`;

  if (moved.length > 0) {
    html += `<h2 style="margin-top:16px">Moved Electorates</h2><div class="move-list">`;
    for (const m of moved.sort((a,b) => a.name.localeCompare(b.name))) {
      html += `<div class="move-item"><span>${m.name} (${m.state})</span><span class="arrow">${m.from} → ${m.to}</span></div>`;
    }
    html += `</div>`;
  }

  if (added.length > 0) {
    html += `<h3>New Electorates</h3><div class="move-list">`;
    for (const n of added.sort()) html += `<div class="move-item"><span class="new">✦ ${n}</span></div>`;
    html += `</div>`;
  }
  if (removed.length > 0) {
    html += `<h3>Abolished Electorates</h3><div class="move-list">`;
    for (const n of removed.sort()) html += `<div class="move-item"><span class="removed">${n}</span></div>`;
    html += `</div>`;
  }

  el.innerHTML = html;
}

// --- Main render ---
function render() {
  if (!DATA) return;
  const [fromId, toId] = currentTab === "2019-2022" ? ["2019-FED", "2022-FED"] : ["2022-FED", "2025-FED"];
  const analysis = analyzeTransition(fromId, toId);

  document.getElementById("left-title").textContent = analysis.fromEntry.label;
  document.getElementById("left-count").textContent = `${analysis.fromEntry.seatCount} seats`;
  document.getElementById("right-title").textContent = analysis.toEntry.label;
  document.getElementById("right-count").textContent = `${analysis.toEntry.seatCount} seats`;

  const movedNames = analysis.moved.map(m => m.name);
  const addedNames = analysis.added;

  renderMap(document.getElementById("map-left"), analysis.fromHexes, { movedNames, highlight: "changes" });
  renderMap(document.getElementById("map-right"), analysis.toHexes, { movedNames, addedNames, highlight: "changes" });
  renderAnalysis(analysis);
}

// Tab switching
document.getElementById("tabs").addEventListener("click", (e) => {
  const tab = e.target.closest(".tab");
  if (!tab) return;
  document.querySelectorAll(".tab").forEach(t => t.classList.remove("active"));
  tab.classList.add("active");
  currentTab = tab.dataset.tab;
  render();
});

loadData();
</script>
</body>
