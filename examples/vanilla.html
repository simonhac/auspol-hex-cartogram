<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Australian Federal Electorate Hex Cartogram</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; background: #111; color: #e5e5e5; display: flex; flex-direction: column; align-items: center; padding: 24px; min-height: 100vh; }
  h1 { font-size: 1.4rem; margin-bottom: 4px; }
  .subtitle { color: #888; font-size: 0.85rem; margin-bottom: 16px; }
  .controls { display: flex; gap: 12px; align-items: center; margin-bottom: 16px; }
  select { background: #222; color: #e5e5e5; border: 1px solid #444; border-radius: 4px; padding: 6px 10px; font-size: 0.85rem; }
  .map-container { width: 100%; max-width: 720px; }
  svg polygon { transition: opacity 0.15s; }
  .legend { display: flex; flex-wrap: wrap; gap: 12px; justify-content: center; margin-top: 12px; font-size: 0.75rem; color: #aaa; }
  .legend-item { display: flex; align-items: center; gap: 4px; }
  .legend-swatch { width: 12px; height: 12px; border-radius: 2px; }
  .info { color: #888; font-size: 0.75rem; margin-top: 8px; }
  #tooltip { position: fixed; background: #222; border: 1px solid #444; border-radius: 4px; padding: 6px 10px; font-size: 0.8rem; pointer-events: none; display: none; z-index: 10; }
</style>
</head>
<body>
<h1>Australian Federal Electorate Hex Cartogram</h1>
<p class="subtitle">Equal-area representation &mdash; every electorate gets one hexagon</p>

<div class="controls">
  <label>Election: <select id="election-select">
    <option value="2019-FED">2019 Federal (151 seats)</option>
    <option value="2022-FED" selected>2022 Federal (151 seats)</option>
    <option value="2025-FED">2025 Federal (150 seats)</option>
  </select></label>
</div>

<div class="map-container">
  <svg id="map" preserveAspectRatio="xMidYMid meet"></svg>
</div>

<div class="legend" id="legend"></div>
<p class="info" id="info"></p>
<div id="tooltip"></div>

<script>
// --- Hex geometry ---
const HEX_SIZE = 14;
const HEX_W = Math.sqrt(3) * HEX_SIZE;
const HEX_H = 2 * HEX_SIZE;

function cellToPixel(col, row) {
  return { x: HEX_W * (col + 0.5 * (row & 1)), y: 0.75 * HEX_H * row };
}

function hexPoints(cx, cy, size) {
  const pts = [];
  for (let i = 0; i < 6; i++) {
    const a = (Math.PI / 3) * i - Math.PI / 2;
    pts.push(`${cx + size * Math.cos(a)},${cy + size * Math.sin(a)}`);
  }
  return pts.join(" ");
}

function computeStateBorders(hexes, size) {
  const evenNbr = [[0,-1],[1,0],[0,1],[-1,1],[-1,0],[-1,-1]];
  const oddNbr = [[1,-1],[1,0],[1,1],[0,1],[-1,0],[0,-1]];
  const stateAt = new Map();
  for (const h of hexes) stateAt.set(`${h.col},${h.row}`, h.state);
  const segs = [];
  for (const h of hexes) {
    const nbrs = h.row & 1 ? oddNbr : evenNbr;
    for (let d = 0; d < 6; d++) {
      const [dc, dr] = nbrs[d];
      if (stateAt.get(`${h.col+dc},${h.row+dr}`) === h.state) continue;
      const a0 = (Math.PI/3)*d - Math.PI/2, a1 = (Math.PI/3)*((d+1)%6) - Math.PI/2;
      segs.push(`M${(h.px+size*Math.cos(a0)).toFixed(2)},${(h.py+size*Math.sin(a0)).toFixed(2)}L${(h.px+size*Math.cos(a1)).toFixed(2)},${(h.py+size*Math.sin(a1)).toFixed(2)}`);
    }
  }
  return segs.join("");
}

const STATE_COLORS = { ACT:"#8B5CF6", NSW:"#3B82F6", NT:"#F97316", QLD:"#991B1B", SA:"#EF4444", TAS:"#06B6D4", VIC:"#1D4ED8", WA:"#EAB308" };

// --- Data (loaded from elections.json) ---
let DATA = null;

async function loadData() {
  const resp = await fetch("../data/elections.json");
  DATA = await resp.json();
  render();
}

function resolve(grid) {
  return grid.map(([col, row, state, name]) => {
    const { x, y } = cellToPixel(col, row);
    return { col, row, state, name, px: x, py: y };
  });
}

// --- Rendering ---
const svgNS = "http://www.w3.org/2000/svg";
const svg = document.getElementById("map");
const tooltip = document.getElementById("tooltip");
const infoEl = document.getElementById("info");

function render() {
  const electionId = document.getElementById("election-select").value;
  const entry = DATA[electionId];
  const hexes = resolve(entry.grid);

  // Clear
  svg.innerHTML = "";

  // ViewBox
  const pad = HEX_SIZE * 2;
  const xs = hexes.map(h => h.px), ys = hexes.map(h => h.py);
  const minX = Math.min(...xs) - pad, minY = Math.min(...ys) - pad;
  const maxX = Math.max(...xs) + pad, maxY = Math.max(...ys) + pad;
  svg.setAttribute("viewBox", `${minX} ${minY} ${maxX-minX} ${maxY-minY}`);

  // Hexes
  for (const h of hexes) {
    const poly = document.createElementNS(svgNS, "polygon");
    poly.setAttribute("points", hexPoints(h.px, h.py, HEX_SIZE));
    poly.setAttribute("fill", STATE_COLORS[h.state] || "#6B7280");
    poly.setAttribute("stroke", "rgba(255,255,255,0.3)");
    poly.setAttribute("stroke-width", "0.5");
    poly.style.cursor = "pointer";
    poly.addEventListener("mouseenter", (e) => {
      poly.setAttribute("stroke", "white");
      poly.setAttribute("stroke-width", "3");
      tooltip.style.display = "block";
      tooltip.innerHTML = `<strong>${h.name}</strong><br>${h.state} &middot; [${h.col}, ${h.row}]`;
    });
    poly.addEventListener("mousemove", (e) => {
      tooltip.style.left = (e.clientX + 12) + "px";
      tooltip.style.top = (e.clientY - 10) + "px";
    });
    poly.addEventListener("mouseleave", () => {
      poly.setAttribute("stroke", "rgba(255,255,255,0.3)");
      poly.setAttribute("stroke-width", "0.5");
      tooltip.style.display = "none";
    });
    svg.appendChild(poly);
  }

  // State borders
  const path = document.createElementNS(svgNS, "path");
  path.setAttribute("d", computeStateBorders(hexes, HEX_SIZE));
  path.setAttribute("fill", "none");
  path.setAttribute("stroke", "rgba(255,255,255,0.5)");
  path.setAttribute("stroke-width", "2");
  path.setAttribute("stroke-linecap", "round");
  path.setAttribute("pointer-events", "none");
  svg.appendChild(path);

  // Legend
  const legendEl = document.getElementById("legend");
  legendEl.innerHTML = Object.entries(STATE_COLORS).map(([state, color]) =>
    `<span class="legend-item"><span class="legend-swatch" style="background:${color}"></span>${state}</span>`
  ).join("");

  infoEl.textContent = `${entry.label} — ${entry.seatCount} electorates`;
}

document.getElementById("election-select").addEventListener("change", render);
loadData();
</script>
</body>
</html>
